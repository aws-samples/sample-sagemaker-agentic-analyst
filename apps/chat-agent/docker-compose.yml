services:
  chat-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: chat-agent:latest
    container_name: chat-agent-dev
    ports:
      - '8080:8080'
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=8080
      - AWS_REGION=${AWS_REGION:-ap-northeast-1}
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_SESSION_TOKEN
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/ping']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - agent-network

networks:
  agent-network:
    driver: bridge
