AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Role for AI Agent (Kiro) - Agentic Analyst operator role with least privilege

Resources:
  AIOperatorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AgenticAnalyst-OperatorRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub 'arn:${AWS::Partition}:iam::aws:policy/ReadOnlyAccess'
      Tags:
        - Key: Application
          Value: Agentic Analyst
      Policies:
        - PolicyName: CDKDeployAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: AssumeRoleCDKBootstrapRoles
                Effect: Allow
                Action: sts:AssumeRole
                Resource: !Sub 'arn:${AWS::Partition}:iam::${AWS::AccountId}:role/cdk-*'
                Condition:
                  StringEquals:
                    iam:ResourceTag/aws-cdk:bootstrap-role:
                      - deploy
                      - file-publishing
                      - image-publishing
                      - lookup

        - PolicyName: OperationalAccessWithABAC
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: LambdaInvoke
                Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: '*'
                Condition:
                  StringEquals:
                    aws:ResourceTag/Application: Agentic Analyst

              - Sid: S3ObjectAccess
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: '*'
                Condition:
                  StringEquals:
                    aws:ResourceTag/Application: Agentic Analyst

              - Sid: CdkStagingBucketAccess
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !Sub 'arn:${AWS::Partition}:s3:::cdk-*-assets-${AWS::AccountId}-*/cfn-templates/*'

              - Sid: CognitoUserManagement
                Effect: Allow
                Action:
                  - cognito-idp:AdminCreateUser
                  - cognito-idp:AdminDeleteUser
                  - cognito-idp:AdminAddUserToGroup
                  - cognito-idp:AdminRemoveUserFromGroup
                  - cognito-idp:AdminSetUserPassword
                  - cognito-idp:AdminUpdateUserAttributes
                  - cognito-idp:AdminDisableUser
                  - cognito-idp:AdminEnableUser
                Resource: '*'
                Condition:
                  StringEquals:
                    aws:ResourceTag/Application: Agentic Analyst

        - PolicyName: OperationalAccessGlobal
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: CloudWatchLogsInsights
                Effect: Allow
                Action:
                  - logs:StartQuery
                  - logs:StopQuery
                Resource: '*'

              - Sid: CloudTrailLake
                Effect: Allow
                Action:
                  - cloudtrail:StartQuery
                  - cloudtrail:DescribeQuery
                  - cloudtrail:GetQueryResults
                Resource: '*'

              - Sid: AthenaQueryExecution
                Effect: Allow
                Action:
                  - athena:StartQueryExecution
                  - athena:GetQueryExecution
                  - athena:GetQueryResults
                  - athena:StopQueryExecution
                Resource: '*'

              - Sid: BedrockAccess
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                  - bedrock:ListFoundationModels
                  - bedrock:GetFoundationModel
                  - bedrock:ListInferenceProfiles
                  - bedrock:GetInferenceProfile
                Resource: '*'

              - Sid: BedrockAgentCoreAccess
                Effect: Allow
                Action:
                  - bedrock-agentcore:InvokeRuntime
                  - bedrock-agentcore:InvokeGateway
                Resource: '*'

              - Sid: DataZoneManagement
                Effect: Allow
                Action:
                  - datazone:GetDomain
                  - datazone:ListDomains
                  - datazone:ListProjects
                  - datazone:GetEnvironment
                  - datazone:GetEnvironmentCredentials
                  - datazone:ListEnvironments
                  - datazone:GetConnection
                  - datazone:ListConnections
                  - datazone:ListProjectMemberships
                Resource: '*'

Outputs:
  RoleArn:
    Description: ARN of the AIOperatorRole
    Value: !GetAtt AIOperatorRole.Arn
  RoleName:
    Description: Name of the AIOperatorRole
    Value: !Ref AIOperatorRole
